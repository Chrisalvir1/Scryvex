# Scryvex — Docker Compose para Raspberry Pi OS
# Optimizado para: RPi 4 (4GB+), RPi 5
# Arquitectura: linux/arm64
#
# Uso rápido:
#   curl -fsSL https://raw.githubusercontent.com/Chrisalvir1/Scryvex/main/scripts/install_rpi.sh | bash
#
# O manual:
#   docker compose -f docker-compose.rpi.yml up -d

version: "3.9"

services:
  scryvex:
    image: ghcr.io/chrisalvir1/scryvex:latest-arm64
    # Build local en RPi (lento ~10min, solo si modificas código):
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     TARGETARCH: arm64
    container_name: scryvex
    restart: unless-stopped

    # En RPi Linux: network_mode host para que Matter/mDNS funcione
    # NECESARIO para: QR Matter scaneable desde HomeKit/Google/Alexa en la LAN
    network_mode: host

    environment:
      - TZ=${TZ:-America/Costa_Rica}
      - PORT=1994
      - MATTER_PORT=5580
      - MATTER_VID=${MATTER_VID:-65521}
      - MATTER_PID=${MATTER_PID:-32768}
      - MATTER_NAME=${MATTER_NAME:-Scryvex Hub}
      - THREAD_ENABLED=true
      - AI_ENABLED=${AI_ENABLED:-true}
      - GPU_DEVICE=cpu         # RPi usa CPU (no GPU dedicada)
      - TUYA_CLIENT_ID=${TUYA_CLIENT_ID:-}
      - TUYA_CLIENT_SECRET=${TUYA_CLIENT_SECRET:-}
      - TUYA_REGION=${TUYA_REGION:-eu}
    
    volumes:
      - /opt/scryvex/data:/data
      - /opt/scryvex/logs:/logs
      - /opt/scryvex/configs:/app/configs

    # RPi: limitar uso de recursos
    deploy:
      resources:
        limits:
          memory: 384M        # conservador para RPi 4 con 4GB
          cpus:   "2.0"       # usar 2 cores máximo
        reservations:
          memory: 128M
          cpus:   "0.5"

    # Acceso al hardware (opcional, para USB Thread dongle)
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0   # Thread dongle (ej: Nordic nRF52840)
      - /dev/ttyACM0:/dev/ttyACM0   # Thread dongle alternativo
    privileged: false

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1994/api/status"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s     # RPi tarda más en arrancar

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
