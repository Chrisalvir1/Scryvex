name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            asset: scryvex-macos-arm64
          - goos: darwin
            goarch: amd64
            asset: scryvex-macos-x86_64
          - goos: linux
            goarch: amd64
            asset: scryvex-linux-amd64
          - goos: linux
            goarch: arm64
            asset: scryvex-linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            asset: scryvex-linux-armv7
          - goos: windows
            goarch: amd64
            asset: scryvex-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          CGO_ENABLED: '0'
        run: |
          go build \
            -ldflags="-s -w \
              -X main.version=${{ github.ref_name }} \
              -X main.buildDate=$(date -u +%Y%m%d)" \
            -o ${{ matrix.asset }} \
            ./cmd/server

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Scryvex ${{ github.ref_name }}"
          body: |
            ## Scryvex ${{ github.ref_name }}

            ### Instalación rápida
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Chrisalvir1/Scryvex/main/scripts/install.sh | bash
            ```

            ### Actualizar desde versión anterior
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Chrisalvir1/Scryvex/main/scripts/update.sh | bash
            ```

            ### Binarios disponibles
            | Plataforma | Archivo |
            |---|---|
            | macOS Apple Silicon (M1/M2/M3/M4) | `scryvex-macos-arm64` |
            | macOS Intel | `scryvex-macos-x86_64` |
            | Linux x86_64 | `scryvex-linux-amd64` |
            | Linux ARM64 | `scryvex-linux-arm64` |
            | Raspberry Pi (ARMv7) | `scryvex-linux-armv7` |
            | Windows x64 | `scryvex-windows-amd64.exe` |

            Verifica integridad con `SHA256SUMS.txt`.
          files: |
            dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
